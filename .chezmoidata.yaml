gh_extensions:
  - dlvhdr/gh-dash

sketchybar:
  # Compact mode shifts items to the left half of the bar (avoiding the MBP
  # notch) and hides empty aerospace workspaces. Enable per-machine in
  # ~/.config/chezmoi/chezmoi.toml: [data.sketchybar] compact = true
  compact: false
  stats:
    cpu: true
    memory: true
    disk_volumes:
      - /

linearmouse_trackpads:
  - productID: "0x265"
    productName: "Magic Trackpad"
    vendorID: "0x5ac"
  - productID: "0x324"
    productName: "Magic Trackpad"
    vendorID: "0x5ac"
