[settings]
python.uv_venv_auto = false
idiomatic_version_file_enable_tools = ["python"]
experimental = true

[tools]
age = "latest"
node = "22"
gcloud = { version = "latest", postinstall = "gcloud components install gke-gcloud-auth-plugin --quiet && $(gcloud info --format='value(config.paths.global_config_dir)')/virtenv/bin/pip install numpy" }

"pipx:httpie" = "latest"
"pipx:pre-commit" = "latest"
"pipx:llm" = { version = "latest", uvx_args = "--with llm-mlx --with llm-gpt4all --with llm-anthropic --with llm-tools-simpleeval --with llm-cmd --with llm-jq --with llm-python" }
sops = "latest"
watchexec = "latest"
"pipx:justpath" = "latest"
"pipx:claude-code-transcripts" = "latest"
"npm:opencode-ai" = "latest"
"npm:@ast-grep/napi" = "latest"
"npm:@mermaid-js/mermaid-cli" = "latest"
prek = "latest"
opencode = "latest"

# Cargo packages
"cargo:cargo-update" = "latest"
"cargo:claude-tmux" = "latest"

# Go packages
"go:gotest.tools/gotestsum" = "latest"
"go:github.com/spf13/cobra-cli" = "latest"
"go:github.com/bonnefoa/kubectl-fzf/v3/cmd/kubectl-fzf-completion" = "latest"
"go:github.com/bonnefoa/kubectl-fzf/v3/cmd/kubectl-fzf-server" = "latest"
hk = "latest"
