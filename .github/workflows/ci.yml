name: CI

on:
  pull_request:

jobs:
  render:
    name: "Render (${{ matrix.name }})"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: base
            extras: "[]"
          - name: personal
            extras: '["personal"]'
          - name: moov
            extras: '["moov"]'

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Cache chezmoi binary
        id: cache-chezmoi
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.local/bin/chezmoi
          key: chezmoi-${{ runner.os }}-${{ runner.arch }}

      - name: Install chezmoi
        if: steps.cache-chezmoi.outputs.cache-hit != 'true'
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: Add chezmoi to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Write mock chezmoi config
        run: |
          mkdir -p "$HOME/.config/chezmoi"
          cat > "$HOME/.config/chezmoi/chezmoi.toml" <<TOML
          [data]
          hostname = "ci-runner"
          email = "ci@example.com"
          default_browser = "Google Chrome"
          set_hostname = false
          default_vault = "brain"
          webdav_port = 56726
          google_meet_app_id = ""
          atuin_history_filter = []
          atuin_cwd_filter = []
          extra_obsidian_vaults = []
          extras = ${{ matrix.extras }}
          TOML

      - name: Render chezmoi templates
        run: |
          mkdir -p /tmp/chezmoi-dest
          chezmoi apply \
            --source="$GITHUB_WORKSPACE" \
            --destination=/tmp/chezmoi-dest \
            --exclude=scripts,externals \
            --no-tty

      - name: Install validator dependencies
        run: python3 -m pip install --quiet pyyaml ruff

      - name: Validate rendered configs (TOML/YAML/JSON/plist)
        run: python3 .github/scripts/validate-configs.py /tmp/chezmoi-dest --quiet

      - name: Validate rendered Python (py_compile + ruff)
        run: |
          python3 .github/scripts/pycheck-rendered.py \
            /tmp/chezmoi-dest "$GITHUB_WORKSPACE" \
            --ruff --quiet

      - name: Install ShellCheck
        run: sudo apt-get install -y --no-install-recommends shellcheck

      - name: ShellCheck rendered scripts and run scripts
        run: .github/scripts/shellcheck-rendered.sh /tmp/chezmoi-dest "$GITHUB_WORKSPACE"

      - name: Upload rendered output
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rendered-${{ matrix.name }}
          path: /tmp/chezmoi-dest
          # Required so dotfile dirs (.config, .claude, etc.) end up in the artifact.
          include-hidden-files: true
          retention-days: 3

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: render

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Download rendered config (personal)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: rendered-personal
          path: /tmp/chezmoi-dest

      - name: Place rendered configs for tests
        run: |
          # Tests import from deployed paths (e.g. ~/.config/finicky/finicky.js).
          # Merge into $HOME instead of copying onto it so an existing ~/.config
          # on the runner doesn't turn this into ~/.config/.config.
          mkdir -p "$HOME/.config"
          cp -r /tmp/chezmoi-dest/.config/. "$HOME/.config/"

      - name: Run tests
        run: node --test dot_config/**/*.test.mjs
