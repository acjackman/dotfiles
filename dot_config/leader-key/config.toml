# Open

[p]
label = "DeskPad"
rank = 45

[p.children.p.action]
rank = 10
kind = "application"
value = "/Applications/DeskPad.app"

[p.children.q]
label = "Quit DeskPad"

[p.children.q.action]
rank = 20
kind = "command"
value = "osascript -e 'quit app \"DeskPad\"'"

[u]
label = "UI Tweaks"
rank = 47

[u.children.p]
label = "Toggle DeskPad"

[u.children.p.action]
rank = 3
kind = "command"
value = "osascript -e 'if application \"DeskPad\" is running then' -e 'quit app \"DeskPad\"' -e 'else' -e 'tell application \"DeskPad\" to activate' -e 'end if'"

[u.children.w]
label = "Rotate Wallpapers"

[u.children.w.action]
rank = 5
kind = "url"
value = "hammerspoon://rotate-wallpapers"

[u.children.d]
label = "Toggle Dark Mode"

[u.children.d.action]
rank = 10
kind = "command"
value = "osascript -e 'tell app \"System Events\" to tell appearance preferences to set dark mode to not dark mode'"

[u.children.v]
label = "Toggle Vim Mode (ovim)"

[u.children.v.action]
rank = 15
kind = "command"
value = ",ovim-in-place"

[u.children.h]
label = "HazeOver"
rank = 20

[u.children.h.children.h]
label = "Toggle"

[u.children.h.children.h.action]
rank = 10
kind = "command"
value = "osascript -e 'tell app \"HazeOver\" to set enabled to not enabled'"

[u.children.h.children."="]
label = "Increase Opacity"

[u.children.h.children."=".action]
rank = 20
kind = "command"
value = "osascript -e 'tell app \"HazeOver\" to set intensity to (intensity + 10)'"

[u.children.h.children."-"]
label = "Decrease Opacity"

[u.children.h.children."-".action]
rank = 30
kind = "command"
value = "osascript -e 'tell app \"HazeOver\" to set intensity to (intensity - 10)'"

[a]
label = "SuperWhisper"
rank = 48

[a.children.r]
label = "Toggle Recording"

[a.children.r.action]
rank = 10
kind = "command"
value = "osascript -e 'tell application \"System Events\" to key code 64 using {command down, option down, control down, shift down}'"

[a.children.m]
label = "Change Mode"

[a.children.m.action]
rank = 20
kind = "command"
value = "osascript -e 'tell application \"System Events\" to key code 64 using {command down, option down, control down}'"

