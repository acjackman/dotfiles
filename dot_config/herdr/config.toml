# herdr configuration — trialling herdr side-by-side with tmux (see CLAUDE.md).
#
# herdr ships built-in defaults and writes no default config.toml, but it DOES
# write settings back into this file (`onboarding`, `[ui]` below) when you change
# them in-app. Anything herdr owns must be mirrored here or `chezmoi apply` will
# strip it — if a setting reappears in `chezmoi diff`, herdr wrote it; adopt it
# rather than reverting.
#
# Otherwise this file is additive: overriding a [keys] action *replaces* its
# binding; actions left unset keep herdr's defaults (press prefix+? in-app for
# the live list). herdr warns on bad keybindings in herdr-server.log — but only
# for unparseable names; a binding can parse and still never fire (see
# split_vertical below), so verify new keys in-app rather than trusting the log.
#
# Keybindings below close the gaps between herdr's (already tmux-like) defaults
# and the muscle memory in dot_config/tmux/tmux.reset.conf. Verified vs herdr 0.7.1.

# Set by herdr once onboarding is dismissed; mirrored so apply doesn't replay it.
onboarding = false

[keys]
# tmux: `set -g prefix C-Space` — the single biggest "feel at home" change.
# Same Ctrl+Space caveat as the tmux leader: a macOS input-source shortcut can
# steal it after OS upgrades (see the tmux-prefix note).
prefix = "ctrl+space"

# tmux: `bind d detach-client` (herdr's default is prefix+q, still useful to know).
detach = "prefix+d"

# Splits, tmux-style: `|` side-by-side, `-` stacked.
# tmux: `bind | split-window -h` / `bind - split-window -v`.
# Bind the literal shifted character. herdr matches on the character produced,
# so `backslash`/`shift+backslash` parse without warning but never fire on `|`.
split_vertical = "prefix+|"       # herdr "vertical" = vertical divider = side-by-side
split_horizontal = "prefix+minus" # matches herdr's default; kept explicit

# tmux-faithful tab (≈ window) ops. Each RECLAIMS a key from a herdr default;
# that default is relocated below so nothing is lost (one action per key).
new_tab = "prefix+n"    # tmux: bind n new-window   (herdr default was prefix+c)
close_tab = "prefix+w"  # tmux: bind w kill-window   (herdr default was prefix+shift+x)
rename_tab = "prefix+r" # tmux: bind r rename-window (herdr default was prefix+shift+t)
next_tab = "prefix+>"
previous_tab = "prefix+<"

# # tmux `bind o` seSh picker. herdr workspaces ≈ tmux sessions, so the workspace
# # picker is the closest analogue (herdr default was prefix+w, reclaimed above).
# workspace_picker = "prefix+o"

# Relocated herdr defaults displaced by the reclaims above:
resize_mode = "prefix+shift+r" # was prefix+r (herdr's interactive resize mode)

# ── Plugin actions ───────────────────────────────────────────────────────────

# vim-herdr-navigation: <C-h/j/k/l> across herdr panes and Neovim splits.
[[keys.command]]
key = "ctrl+h"
type = "plugin_action"
command = "vim-herdr-navigation.left"
description = "navigate left (vim/herdr)"

[[keys.command]]
key = "ctrl+j"
type = "plugin_action"
command = "vim-herdr-navigation.down"
description = "navigate down (vim/herdr)"

[[keys.command]]
key = "ctrl+k"
type = "plugin_action"
command = "vim-herdr-navigation.up"
description = "navigate up (vim/herdr)"

[[keys.command]]
key = "ctrl+l"
type = "plugin_action"
command = "vim-herdr-navigation.right"
description = "navigate right (vim/herdr)"

# herdr-worktrunk: worktree switch/create + remove via worktrunk (`wt`) + fzf.
# Mirrors the tmux wt-sesh-select bindings; overrides herdr's raw worktree keys.
[[keys.command]]
key = "prefix+shift+g"
type = "plugin_action"
command = "worktrunk.open"
description = "Worktree: switch / create (worktrunk)"

[[keys.command]]
key = "prefix+shift+d"
type = "plugin_action"
command = "worktrunk.remove"
description = "Worktree: remove (worktrunk)"

# Break the focused pane out into its own tab / workspace — herdr's analogue of
# tmux `break-pane` (`prefix+!`). herdr has no built-in action for this, so these
# drive the `herdr pane move` CLI. Shell keybindings run with the active
# workspace/tab/pane/cwd context injected (CHANGELOG #621) under the HERDR_ACTIVE_*
# namespace — NOT the HERDR_PANE_ID a pane's own shell sees (that one is unset
# here, and an empty pane arg fails with `pane_not_found`). prefix+t is unbound by
# default; prefix+shift+t is free because rename_tab (herdr's default there) was
# reclaimed to prefix+r above.
[[keys.command]]
key = "prefix+t"
type = "shell"
command = '"$HERDR_BIN_PATH" pane move "$HERDR_ACTIVE_PANE_ID" --new-tab --focus'
description = "Break pane into a new tab"

[[keys.command]]
key = "prefix+shift+t"
type = "shell"
command = '"$HERDR_BIN_PATH" pane move "$HERDR_ACTIVE_PANE_ID" --new-workspace --focus'
description = "Break pane into a new workspace"

# muster: agent-aware project switcher — fuzzy list of projects, running ones
# first, tagged with what their agent is doing (blocked floats to the top).
# It's explicitly modelled on sesh, so it's the closest thing herdr has to the
# tmux `bind o` sesh picker; the `workspace_picker = "prefix+o"` block above is
# still commented out, so prefix+o is left alone rather than quietly reassigned.
#
# Bound to `prefix+enter`. herdr has no default on Enter/Return (verified against
# the binary's embedded default keymap — pane cycling uses prefix+tab, and
# prefix+space was muster's own, never a herdr default), so this displaces
# nothing. Upstream documents `prefix+space`; we prefer Enter for the muscle
# memory of "confirm → pick a project".
#
# Kept as a `shell` command — also upstream's documented form — rather than the
# `plugin_action` form the other plugins use. muster does declare an `open`
# action (confirmed via `herdr plugin action list`: action_id "open"), so this
# could be switched to `type = "plugin_action"` / `command = "kichel.muster.open"`
# if you'd rather match the plugins above.
[[keys.command]]
key = "prefix+enter"
type = "shell"
command = "herdr plugin pane open --plugin kichel.muster --entrypoint picker"
description = "Muster: pick project"

# herdr-pluck: tmux-fingers-style hint picker. Overlays keyboard hints on the
# visible copyable tokens; the chosen one is copied to the clipboard (pbcopy).
# Bound to `prefix+space`, freed up when muster moved to prefix+enter above —
# it was muster's own key, never a herdr default, so this displaces nothing.
# Upstream documents `prefix+q`; we prefer space here for the free key.
[[keys.command]]
key = "prefix+space"
type = "plugin_action"
command = "rmarganti.herdr-pluck.pluck"
description = "Pluck: copy a visible token"

# Set by herdr in-app (agent panel sort order); mirrored so apply preserves it.
# herdr renamed the variants (`grouped` is gone); valid values are now
# `spaces`, `workspaces`, `priority` — `priority` floats blocked/attention-needing
# agents to the top, the closest match to the old grouped behaviour.
[ui]
agent_panel_sort = "priority"
