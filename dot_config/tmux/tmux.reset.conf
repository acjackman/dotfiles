# First remove *all* keybindings
unbind-key -a

# Now reinsert all the regular tmux keys
bind : command-prompt
bind ^X lock-server
bind ^D detach
# bind * list-clients

# Set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Reload config
# bind R source-file ~/.config/tmux/tmux.conf
# bind T source-file ~/.config/tmux/tmux.conf

bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
bind-key X kill-window

bind ? list-keys

##############################
# Pane splits
##############################
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind L next-layout

# Pane navigation via christoomey/vim-tmux-navigator
# bind -n C-h select-pane -L
# bind -n C-j select-pane -D
# bind -n C-k select-pane -U
# bind -n C-l select-pane -R

# Duplicate navigation for remote session
bind C-Left select-pane -L
bind C-Down select-pane -D
bind C-Up select-pane -U
bind C-Right select-pane -R

bind z resize-pane -Z

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind "{" swap-pane -U
bind "}" swap-pane -D

bind t run-shell "~/.config/tmux/break-pane-and-rename.sh '#{pane_current_path}'"

##############################
# Windows
##############################
bind n new-window -c "#{pane_current_path}"
bind N new-window -c "$HOME"
bind r command-prompt "rename-window %%"
bind C-r run-shell "tmux rename-window \"$(~/.config/tmux/rename-from-repo.sh '#{pane_current_path}')\""
bind C-u set-window-option automatic-rename on
bind w kill-window
bind -r < run-shell "tmux swap-window -t -1; tmux select-window -t $((#{window_index}-1))"
bind -r > run-shell "tmux swap-window -t +1; tmux select-window -t $((#{window_index}+1))"

bind 1 select-window -t:1
bind 2 select-window -t:2
bind 3 select-window -t:3
bind 4 select-window -t:4
bind 5 select-window -t:5
bind 6 select-window -t:6
bind 7 select-window -t:7
bind 8 select-window -t:8
bind 9 select-window -t:9
bind 0 select-window -t:10

# bind -r h select-window -t :-
# bind -r l select-window -t :+

bind '"' choose-window

#############################
# Sessions
##############################
bind d detach-client
bind R command-prompt "rename-session %%"
bind C-R run-shell "tmux rename-session \"$(tmux-session-name '#{pane_current_path}')\""
bind T run-shell "~/.config/tmux/move-window-to-session.sh '#{pane_current_path}' '#{session_name}' '#{window_index}'"
bind C-t run-shell "~/.config/tmux/detach-to-ghostty.sh '#{pane_current_path}' '#{session_name}' '#{window_index}' && ~/.config/tmux/activate-or-open-ghostty.sh --from-file /tmp/wt-ghostty-pending"

# sesh (duplicate of "s")
bind-key "o" display-popup -E -w 100% -h 100% "~/.config/tmux/tmux_launcher.sh"

# tmux-resurect
# bind C-s # Save session
# bind C-r # retore session

bind-key q if-shell '[ $(tmux list-clients -t "#S" | wc -l) -gt 1 ]' 'detach-client' 'confirm-before -p "Kill session #S? (y/n)" "kill-session -t \"#S\""'
bind-key Q run-shell 'tmux switch-client -n \; kill-session -t "#S"'


bind-key "g" run-shell "tmux display-popup -w 80% -h 70% -E \"wt-sesh-select --window '#{pane_current_path}'\""
bind-key "G" run-shell "tmux display-popup -w 80% -h 70% -E \"wt-sesh-select --move-window '#{pane_current_path}'\" && ~/.config/tmux/move-window-from-file.sh /tmp/wt-move-window-pending"
bind-key C-g run-shell "tmux display-popup -w 80% -h 70% -E \"wt-sesh-select --new-window '#{pane_current_path}'\" && ~/.config/tmux/activate-or-open-ghostty.sh --from-file /tmp/wt-ghostty-pending"

##############################
# copy-mode
##############################
bind c copy-mode
bind-key -T copy-mode    C-c               send-keys -X cancel
bind-key -T copy-mode    Escape            send-keys -X cancel
bind-key -T copy-mode    q                 send-keys -X cancel
bind-key -T copy-mode-vi v                 send-keys -X begin-selection
bind-key -T copy-mode-vi C-v               send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y                 send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-c               send-keys -X cancel
bind-key -T copy-mode-vi q                 send-keys -X cancel

# fcsonline/tmux-thumbs
# bind 'space' thumbs-pick

##############################
# Overlays
##############################
# navi
bind-key -T prefix . split-window \
  "$SHELL --login -i -c 'navi --print | head -n 1 | tmux load-buffer -b tmp - ; tmux paste-buffer -p -t {last} -b tmp -d'"

# Notes
bind-key b display-popup                   -E nvim -c ":ObsidianToday"
bind-key B display-popup -w "90%" -h "85%" -E nvim -c ":ObsidianSearch"

# Claude
bind-key "s" display-popup -w 100% -h 100% -d "#{pane_current_path}" -E "claude-popup"
