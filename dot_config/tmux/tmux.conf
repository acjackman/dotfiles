# Based on:
# - https://github.com/dreamsofcode-io/tmux/blob/main/tmux.conf
# - https://github.com/omerxx/dotfiles/blob/master/tmux/tmux.conf
# - https://github.com/josean-dev/dev-environment-files/blob/main/.tmux.conf

source-file ~/.config/tmux/tmux.reset.conf

set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'
# set-option -sa terminal-overrides ",xterm*:T"

set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy on      # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g allow-passthrough on      # let OSC 7 reach outer terminal for proxy icon
set -g status-position top       # macOS / darwin style
set -g mouse on                   # Enable ouse for resizing panes
set -g default-terminal "${TERM}"
setw -g mode-keys vi

TMUX_FZF_LAUNCH_KEY="f"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cowboy'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'l-lin/tmux-navi'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'timvw/tmux-assistant-resurrect'

# Theme
set -g @catppuccin_flavour 'mocha'

# Window tabs left
set -g @catppuccin_window_status_style "custom"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator "█ "
set -g @catppuccin_window_number_position "left"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"

set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

run ~/.config/tmux/plugins/catppuccin/catppuccin.tmux

set -g status-right-length 100
set -g status-left-length 100

# Custom client count module (only shows when >1 clients)
set -g @catppuccin_status_clients "#[fg=#f9e2af,nobold,nounderscore,noitalics]#[bg=default]#{@catppuccin_status_left_separator}#[fg=#11111b,bg=#f9e2af] #[fg=#f9e2af,bg=#45475a]#[fg=#cdd6f4] #{session_attached} clients#[fg=#45475a]#[bg=default]#{@catppuccin_status_right_separator}"

set -g status-right "#{?#{e|>:#{session_attached},1},#{E:@catppuccin_status_clients},}"
set -g status-left "#{E:@catppuccin_status_session} "

# fzf-url config
set -g @fzf-url-extra-filter 'grep -oE "obsidian://[^[:space:]]+"'

# Claude Tmux - manage Claude Code sessions
bind-key C-c display-popup -E -w 80% -h 80% "~/.local/share/mise/shims/claude-tmux"

# Navi
set -g @tmux-navi-key-binding 'C-f'
set -g @tmux-navi-width '90%'
set -g @tmux-navi-height '90%'

# Resurrect & Continuum
set -g @resurrect-dir '~/.local/share/tmux/resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# Title (show ghost prefix in Ghostty, plain format elsewhere; per-client via #{client_termname})
set-option -g set-titles on
set-option -g set-titles-string '#{?#{m:xterm-ghostty,#{client_termname}},#{?#{e|>:#{session_attached},1},#(~/.config/tmux/client-number-emoji.sh "#S" "#{client_tty}"),👻} #S | #W,#S | #W#{?#{e|>:#{session_attached},1}, (#(~/.config/tmux/client-number-emoji.sh "#S" "#{client_tty}")),}} | #{s|$HOME|~|:pane_current_path}'

# Re-emit OSC 7 on pane focus so the proxy icon updates immediately
set-hook -g pane-focus-in "run-shell 'printf \"\\033]7;file://$(hostname)#{pane_current_path}\\033\\\\\" > #{client_tty}'"

# Automaticlly install TPM & plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins/'
if "test ! -d ~/.local/share/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.local/share/tmux/plugins/tpm && ~/.local/share/tmux/plugins/tpm/bin/install_plugins'"
run '~/.local/share/tmux/plugins/tpm/tpm'
