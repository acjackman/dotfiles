# Seed values for the non-binding portion of Tuna's config. The generator
# splices this in only on FRESH installs (when ~/.config/tuna/config.toml
# doesn't exist yet). On subsequent runs Tuna owns these tables and the
# generator preserves whatever Tuna last wrote, so theme/hotkey/clipboard
# changes made through Tuna's UI survive `chezmoi apply`.
#
# Editing this file therefore changes the seed for new machines; existing
# machines already have a [hotkeys]/[settings] tail in their config.toml
# and will keep using that.
#
# The leading `schemaVersion` key is emitted by the generator, not stored
# here.
#
# Hotkey modifiers are Carbon constants:
#   cmdKey      = 256
#   shiftKey    = 512
#   optionKey   = 2048
#   controlKey  = 4096
#   key code 49 = Space, key code 6 = V

# Opt+Space — opens Tuna's text mode (Spotlight-style search).
[hotkeys.app.activate]
carbonKeyCode = 49
carbonModifiers = 2048

# Cmd+Space — opens combo mode (the leader-style binding tree below).
[hotkeys.app.comboMode]
carbonKeyCode = 49
carbonModifiers = 256

# Ctrl+Shift+Cmd+V — clipboard history browser.
[[hotkeys.custom]]
id = 'F73C9531-A7CB-4B84-9D47-3ACE0DD97201'
presentation = 'auto'

    [hotkeys.custom.command]
    actionIdentifier = 'Tuna.BasicActionsCatalog.Browse'
    subjectIdentifier = 'Tuna.Internal.ClipboardProxyCatalog.Clipboard History'

    [hotkeys.custom.shortcut]
    carbonKeyCode = 6
    carbonModifiers = 6912

[settings]
comboModeThemeStyle = 'cheatsheet'
screenPreference = 'activeWindow'
themeIdentifier = 'com.brnbw.tuna.themes.default'
